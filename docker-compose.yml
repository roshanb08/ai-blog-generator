services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-blog-generator:latest
    container_name: ai-blog-generator
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ai_blog_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  ai_blog_data:
    driver: local
